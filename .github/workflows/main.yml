name: Deploy Mork to Google VM

on:
  workflow_dispatch: # This enables the manual "Run workflow" button

jobs:
  deploy:
    # Only allow the specific user bones-bones to trigger deployment
    if: github.actor == 'bones-bones'
    runs-on: ubuntu-latest
    permissions:
      contents: 'read'
      id-token: 'write'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 1. Authenticate with Google Cloud using WIF
      - id: 'auth'
        uses: 'google-github-actions/auth@v2'
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SA_EMAIL }}

# 2. Deploy via SSH
      - id: 'ssh'
        uses: 'google-github-actions/ssh-compute@v1'
        with:
          instance_name: ${{ secrets.INSTANCE_NAME }}
          zone: ${{ secrets.INSTANCE_ZONE }}
          ssh_private_key: ${{ secrets.SSH_PRIVATE_KEY }}
          command: |
            set -euo pipefail
            cd ${{ secrets.DEPLOY_PATH }}

            git fetch --all --prune
            git reset --hard origin/main
            echo "Deploying commit:"
            git log -1 --oneline

            if [ -f requirements.txt ]; then
              pip3 install -r requirements.txt --break-system-packages
            fi

            # Kill any manually-started (nohup) instance so we never double-run the
            # bot. The systemd unit runs "/usr/bin/python3 Mork.py"; the manual one
            # runs "python3 -u Mork.py", so this pattern won't hit the service copy.
            sudo pkill -f 'python3 -u Mork.py' || true

            sudo systemctl restart mork
            sleep 5
            systemctl is-active mork
